<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Flappy Bird - Best Audio Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #222;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation; 
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            max-height: 850px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            border-radius: 4px;
            background: #4facfe;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #boost-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 12px;
            border-radius: 8px;
            border: 2px solid #ff8c00;
            color: #d35400;
            font-weight: bold;
            font-size: 14px;
            display: none;
            flex-direction: column;
            gap: 5px;
            width: 130px;
            z-index: 5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .bar-container {
            width: 100%;
            background: #ddd;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }
        #boost-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4500, #ff8c00);
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        #game-over-screen h1 {
            font-size: 2.8rem;
            color: #ff4757;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #000;
        }
        #game-over-screen p {
            font-size: 1.4rem;
            margin-bottom: 25px;
            font-weight: bold;
        }
        #restart-btn {
            background: #2ed573;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 213, 115, 0.4);
            transition: transform 0.1s;
        }
        #restart-btn:active {
            transform: scale(0.95);
        }
        #start-prompt {
            position: absolute;
            bottom: 25%;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 1.5rem;
            font-weight: 900;
            text-shadow: 2px 2px 0px #ff4757, 4px 4px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: blink 0.8s infinite alternate;
            z-index: 4;
        }
        @keyframes blink {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="boost-ui">
            <div>🚀 BOOST ACTIVE</div>
            <div class="bar-container">
                <div id="boost-bar"></div>
            </div>
        </div>

        <div id="start-prompt">TAP TO FLY 👆</div>

        <div id="game-over-screen">
            <h1>Game Over</h1>
            <p>Score: <span id="final-score">0</span></p>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    // Dynamic absolute sizing fallback
    canvas.width = window.innerWidth > 480 ? 480 : window.innerWidth;
    canvas.height = window.innerHeight > 850 ? 850 : window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); draw(); });

const boostUI = document.getElementById('boost-ui');
const boostBar = document.getElementById('boost-bar');
const gameOverScreen = document.getElementById('game-over-screen');
const finalScoreText = document.getElementById('final-score');
const restartBtn = document.getElementById('restart-btn');
const startPrompt = document.getElementById('start-prompt');

let gameRunning = true;
let gameStarted = false;
let score = 0;

const gravity = 0.14;
const jumpPower = -4.0;
let gameSpeed = 1.9;

let bird = {
    x: 75,
    y: canvas.height / 2.5,
    velocity: 0,
    radius: 14,
    angle: 0,
    isBoosting: false,
    boostTimeLeft: 0,
    feathers: []
};

let pipes = [];
let bugs = [];
let clouds = [];
let stars = []; 
let stormFlash = 0; 
let lightningBranches = []; 

// Web Audio Context initialization logic
let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playSound(type) {
    if (!audioCtx || audioCtx.state === 'suspended') return;

    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        switch(type) {
            case 'tap_jump': 
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(750, now + 0.1);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
                break;
                
            case 'score_chime': 
                osc.type = 'sine';
                osc.frequency.setValueAtTime(650, now); 
                osc.frequency.setValueAtTime(950, now + 0.07); 
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.22);
                osc.start(now);
                osc.stop(now + 0.22);
                break;

            case 'powerup_boost': 
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(1500, now + 0.45);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.45);
                osc.start(now);
                osc.stop(now + 0.45);
                break;
                
            case 'crash_thukna': 
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(280, now);
                osc.frequency.linearRampToValueAtTime(40, now + 0.5);
                gain.gain.setValueAtTime(0.35, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
                break;
        }
    } catch(e){}
}

// Environment elements generation
for (let i = 0; i < 20; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * (canvas.height / 2),
        size: Math.random() * 2 + 1,
        alpha: Math.random()
    });
}

for (let i = 0; i < 5; i++) {
    clouds.push({
        x: Math.random() * canvas.width * 1.5,
        y: Math.random() * 150 + 40,
        speed: Math.random() * 0.12 + 0.05,
        size: Math.random() * 20 + 20
    });
}

// Input setup
window.addEventListener('touchstart', (e) => {
    if (e.target === restartBtn) return;
    initAudio();
    handleJump();
});

window.addEventListener('mousedown', (e) => {
    if (e.target === restartBtn) return;
    initAudio();
    handleJump();
});

restartBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    initAudio();
    resetGame();
});

function handleJump() {
    if (!gameRunning) return;
    playSound('tap_jump');
    if (!gameStarted) {
        gameStarted = true;
        startPrompt.style.display = 'none';
    }
    bird.velocity = jumpPower;
}

let pipeTimer = 0;

function createLightning() {
    let startX = Math.random() * canvas.width;
    let startY = 0;
    let path = [{x: startX, y: startY}];
    while(startY < canvas.height - 35) {
        startX += (Math.random() - 0.5) * 40; 
        startY += Math.random() * 30 + 15;    
        path.push({x: startX, y: startY});
    }
    return path;
}

function updateAndSpawn(deltaTime) {
    if (!gameStarted) return;

    let currentSpeed = bird.isBoosting ? gameSpeed * 1.4 : gameSpeed;

    if (bird.isBoosting) {
        bird.boostTimeLeft -= deltaTime;
        let percentage = Math.max(0, (bird.boostTimeLeft / 10000) * 100);
        boostBar.style.width = percentage + '%';
        if (bird.boostTimeLeft <= 0) {
            bird.isBoosting = false;
            boostUI.style.display = 'none';
        }
    }

    pipeTimer += 1;
    let spawnRate = bird.isBoosting ? 90 : 130;
    if (pipeTimer > spawnRate) {
        let gap = 145; 
        let minHeight = 80;
        let maxHeight = canvas.height - gap - 140;
        let topHeight = Math.floor(Math.random() * (maxHeight - minHeight)) + minHeight;
        
        pipes.push({
            x: canvas.width,
            topHeight: topHeight,
            bottomY: topHeight + gap,
            width: 65,
            passed: false
        });

        if (Math.random() < 0.25) { 
            bugs.push({
                x: canvas.width + 32, 
                y: topHeight + gap / 2,     
                radius: 8,
                pulse: 0
            });
        }
        pipeTimer = 0;
    }

    for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= currentSpeed;
        if (!pipes[i].passed && pipes[i].x + pipes[i].width < bird.x) {
            score++;
            pipes[i].passed = true;
            playSound('score_chime');
        }
        if (pipes[i].x + pipes[i].width < 0) pipes.splice(i, 1);
    }

    for (let i = bugs.length - 1; i >= 0; i--) {
        bugs[i].x -= currentSpeed; 
        bugs[i].pulse += 0.1;
        let dist = Math.hypot(bird.x - bugs[i].x, bird.y - bugs[i].y);
        if (dist < bird.radius + bugs[i].radius) {
            triggerBoost();
            bugs.splice(i, 1);
            continue;
        }
        if (bugs[i].x + 20 < 0) bugs.splice(i, 1);
    }

    clouds.forEach(cloud => {
        cloud.x -= cloud.speed;
        if (cloud.x + cloud.size * 2.5 < 0) {
            cloud.x = canvas.width + Math.random() * 50;
            cloud.y = Math.random() * 150 + 40;
        }
    });

    stars.forEach(star => {
        star.alpha += (Math.random() - 0.5) * 0.08;
        if (star.alpha < 0) star.alpha = 0;
        if (star.alpha > 1) star.alpha = 1;
    });

    let currentWeather = Math.floor(score / 15) % 4;
    if (currentWeather === 3 && Math.random() < 0.007) {
        stormFlash = 12; 
        lightningBranches = createLightning(); 
    }
    if (stormFlash > 0) {
        stormFlash--;
        if (stormFlash === 0) lightningBranches = []; 
    }
}

function triggerBoost() {
    bird.isBoosting = true;
    bird.boostTimeLeft = 10000; 
    boostUI.style.display = 'flex';
    boostBar.style.width = '100%';
    playSound('powerup_boost');
}

function processPhysics() {
    if (!gameStarted) return;

    bird.velocity += gravity;
    bird.y += bird.velocity;
    bird.angle = Math.min(Math.PI / 5, Math.max(-Math.PI / 8, bird.velocity * 0.08));

    if (bird.y + bird.radius >= canvas.height - 35) {
        bird.y = canvas.height - 35 - bird.radius;
        triggerGameOver();
    }
    if (bird.y - bird.radius <= 0) {
        bird.y = bird.radius;
        bird.velocity = 0.5;
    }

    pipes.forEach(pipe => {
        if (bird.x + bird.radius - 2 > pipe.x && bird.x - bird.radius + 2 < pipe.x + pipe.width) {
            if (bird.y - bird.radius + 2 < pipe.topHeight || bird.y + bird.radius - 2 > pipe.bottomY) {
                if (bird.isBoosting) {
                    pipe.topHeight = 0;
                    pipe.bottomY = canvas.height;
                } else {
                    triggerGameOver();
                }
            }
        }
    });
}

function processFeathers() {
    for (let index = bird.feathers.length - 1; index >= 0; index--) {
        let p = bird.feathers[index];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.alpha -= 0.02;
        if (p.alpha <= 0) bird.feathers.splice(index, 1);
    }
}

function triggerGameOver() {
    if (!gameRunning) return;
    gameRunning = false;
    playSound('crash_thukna');

    for (let i = 0; i < 20; i++) {
        bird.feathers.push({
            x: bird.x,
            y: bird.y,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.7) * 5,
            radius: Math.random() * 3 + 2,
            alpha: 1,
            color: bird.isBoosting ? '#ffd700' : '#ff4757'
        });
    }

    let decayFrames = 0;
    function featherAnimate() {
        decayFrames++;
        processFeathers();
        draw();
        if (decayFrames < 40) {
            requestAnimationFrame(featherAnimate);
        } else {
            finalScoreText.innerText = score;
            gameOverScreen.style.display = 'flex';
        }
    }
    featherAnimate();
}

function drawDecoratedPipe(x, y, width, height, isTop) {
    if(height <= 0) return;
    ctx.save();
    let baseColor = bird.isBoosting ? '#ffae19' : '#2ed573';
    let darkColor = bird.isBoosting ? '#b57400' : '#1b944c';
    let lightColor = bird.isBoosting ? '#fff066' : '#86f0a9';

    let pipeGrad = ctx.createLinearGradient(x, 0, x + width, 0);
    pipeGrad.addColorStop(0, darkColor);
    pipeGrad.addColorStop(0.2, baseColor);
    pipeGrad.addColorStop(0.4, lightColor);
    pipeGrad.addColorStop(0.7, baseColor);
    pipeGrad.addColorStop(1, darkColor);
    
    ctx.fillStyle = pipeGrad;
    ctx.strokeStyle = '#0f3d1a';
    ctx.lineWidth = 2.5;
    ctx.fillRect(x, y, width, height);
    ctx.strokeRect(x, y, width, height);

    let rimWidth = width + 10;
    let rimHeight = 26;
    let rimX = x - 5;
    let rimY = isTop ? (y + height - rimHeight) : y;

    let rimGrad = ctx.createLinearGradient(rimX, 0, rimX + rimWidth, 0);
    rimGrad.addColorStop(0, darkColor);
    rimGrad.addColorStop(0.2, baseColor);
    rimGrad.addColorStop(0.4, lightColor);
    rimGrad.addColorStop(0.7, baseColor);
    rimGrad.addColorStop(1, darkColor);

    ctx.fillStyle = rimGrad;
    ctx.fillRect(rimX, rimY, rimWidth, rimHeight);
    ctx.strokeRect(rimX, rimY, rimWidth, rimHeight);
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let weatherIndex = Math.floor(score / 15) % 4;
    let skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    let cloudColor = 'rgba(255, 255, 255, 0.65)';

    if (bird.isBoosting) {
        skyGradient.addColorStop(0, '#ff4e50');
        skyGradient.addColorStop(1, '#f9d423');
    } else {
        switch(weatherIndex) {
            case 0: skyGradient.addColorStop(0, '#4facfe'); skyGradient.addColorStop(1, '#fff9e6'); break;
            case 1: skyGradient.addColorStop(0, '#fd1d1d'); skyGradient.addColorStop(1, '#fffae0'); cloudColor = 'rgba(255, 200, 200, 0.5)'; break;
            case 2: skyGradient.addColorStop(0, '#0f2027'); skyGradient.addColorStop(1, '#2c5364'); cloudColor = 'rgba(255, 255, 255, 0.25)'; break;
            case 3: skyGradient.addColorStop(0, stormFlash > 0 ? '#757f9a' : '#2c3e50'); skyGradient.addColorStop(1, '#000000'); cloudColor = 'rgba(74, 85, 96, 0.7)'; break;
        }
    }
    ctx.fillStyle = skyGradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (weatherIndex === 2 && !bird.isBoosting) {
        stars.forEach(star => {
            ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
            ctx.fillRect(star.x, star.y, star.size, star.size);
        });
    }

    clouds.forEach(cloud => {
        ctx.fillStyle = cloudColor;
        ctx.beginPath(); ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
        ctx.arc(cloud.x + cloud.size * 0.6, cloud.y - cloud.size * 0.3, cloud.size * 0.8, 0, Math.PI * 2);
        ctx.arc(cloud.x + cloud.size * 1.2, cloud.y, cloud.size * 0.6, 0, Math.PI * 2); ctx.fill();
    });

    pipes.forEach(pipe => {
        drawDecoratedPipe(pipe.x, 0, pipe.width, pipe.topHeight, true);
        drawDecoratedPipe(pipe.x, pipe.bottomY, pipe.width, canvas.height - pipe.bottomY - 35, false);
    });

    let groundY = canvas.height - 35;
    ctx.fillStyle = weatherIndex === 2 ? '#1e90ff' : (weatherIndex === 3 ? '#1d2a3a' : '#2ed573'); 
    ctx.fillRect(0, groundY, canvas.width, 35);
    ctx.fillStyle = '#ffa502'; 
    ctx.fillRect(0, groundY + 5, canvas.width, 30);

    bugs.forEach(bug => {
        ctx.save(); ctx.translate(bug.x, bug.y); ctx.fillStyle = '#ff4757';
        ctx.beginPath(); ctx.arc(0, 0, bug.radius, 0, Math.PI*2); ctx.fill(); ctx.restore();
    });

    bird.feathers.forEach(p => {
        ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill(); ctx.restore();
    });

    if (gameRunning) {
        ctx.save(); ctx.translate(bird.x, bird.y); ctx.rotate(bird.angle);
        ctx.fillStyle = bird.isBoosting ? '#ffa502' : '#fffa65'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(0, 0, bird.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(5, -3, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(6, -3, 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ff7f50'; ctx.beginPath(); ctx.moveTo(11, -2); ctx.lineTo(19, 0); ctx.lineTo(10, 4); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.restore();
    }

    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#2f3542'; ctx.lineWidth = 5; ctx.font = 'bold 36px sans-serif'; ctx.textAlign = 'center';
    ctx.strokeText(score, canvas.width / 2, 65); ctx.fillText(score, canvas.width / 2, 65);
}

let lastTime = 0;
function loop(timestamp) {
    let deltaTime = timestamp - lastTime;
    if (!lastTime) deltaTime = 0;
    lastTime = timestamp;

    updateAndSpawn(deltaTime);
    processPhysics();
    draw();
    requestAnimationFrame(loop);
}

function resetGame() {
    bird.y = canvas.height / 2.5; bird.velocity = 0; bird.angle = 0; bird.isBoosting = false; bird.boostTimeLeft = 0; bird.feathers = [];
    pipes = []; bugs = []; score = 0; pipeTimer = 0; stormFlash = 0; lightningBranches = [];
    boostUI.style.display = 'none'; gameOverScreen.style.display = 'none'; startPrompt.style.display = 'block';
    gameRunning = true; gameStarted = false; lastTime = 0;
}

// Force engine execution loop manually
requestAnimationFrame(loop);
</script>
</body>
</html>
